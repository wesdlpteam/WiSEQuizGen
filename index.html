<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wesley Quiz Engine v1</title>
<style>
  :root {
    --purple: #4f2759;
    --gold: #c59f40;
    --light-purple: #e9deeb;
    --light-gold: #e4d1a1;
    --grey-purple: #cec3cf;
    --dark-text: #2d1a33;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:system-ui,sans-serif; background:var(--light-purple); padding:16px; }
  .wrap { max-width:640px; margin:0 auto; }
  .hidden { display:none!important; }

  .card { background:white; border-radius:20px; border:1px solid var(--grey-purple); padding:28px; }
  .input { width:100%; border:1px solid var(--grey-purple); border-radius:10px; padding:10px 14px; font-size:13px; outline:none; box-sizing:border-box; color:var(--dark-text); background:white; }
  .input:focus { box-shadow:0 0 0 2px var(--purple); }
  select.input { appearance:auto; cursor:pointer; }

  .btn-primary { width:100%; background:var(--purple); color:white; font-weight:600; padding:12px; border-radius:12px; border:none; cursor:pointer; font-size:14px; }
  .btn-primary:disabled { background:var(--grey-purple); cursor:not-allowed; }
  .btn-primary:hover:not(:disabled) { opacity:0.9; }
  .btn-outline { flex:1; background:transparent; border:2px solid var(--gold); color:var(--gold); font-weight:600; padding:12px; border-radius:12px; cursor:pointer; font-size:14px; }
  .btn-gold { flex:1; background:var(--gold); color:white; font-weight:600; padding:12px; border-radius:12px; border:none; cursor:pointer; font-size:14px; }
  .btn-gold:hover, .btn-outline:hover { opacity:0.85; }
  .btn-small-purple { background:var(--purple); color:white; border:none; border-radius:8px; padding:6px 16px; font-size:13px; cursor:pointer; }
  .btn-small-light { background:var(--light-purple); color:var(--purple); border:none; border-radius:8px; padding:6px 16px; font-size:13px; cursor:pointer; }

  .label { font-size:13px; font-weight:600; color:var(--purple); display:block; margin-bottom:6px; }
  .subtitle { color:#7a5f80; font-size:13px; }

  /* Type selector */
  label.type-option { display:flex; align-items:flex-start; gap:12px; padding:10px 14px; border-radius:12px; border:2px solid var(--grey-purple); background:white; cursor:pointer; transition:all 0.15s; margin-bottom:8px; position:relative; }
  label.type-option.selected { border-color:var(--purple); background:var(--light-purple); }
  .badge { font-size:11px; font-weight:600; padding:2px 10px; border-radius:999px; display:inline-block; }

  /* Tooltips */
  .tooltip { display:none; position:absolute; bottom:calc(100% + 10px); right:0; background:var(--dark-text); color:white; border-radius:10px; padding:12px 14px; width:280px; z-index:100; font-weight:400; pointer-events:none; }
  .tooltip::after { content:''; position:absolute; top:100%; right:20px; border:6px solid transparent; border-top-color:var(--dark-text); }
  label.type-option:hover > .tooltip { display:block; }
  .tooltip.show { display:block; }
  .tooltip .tt-label { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; opacity:0.5; margin-bottom:6px; }
  .tooltip .tt-q { font-size:12px; font-weight:600; margin-bottom:6px; line-height:1.4; }
  .tooltip .tt-detail { font-size:11px; color:rgba(255,255,255,0.55); line-height:1.4; }
  .tooltip .tt-opt { font-size:11px; padding:3px 8px; border-radius:4px; margin-bottom:2px; }
  .tooltip .tt-correct { background:rgba(255,255,255,0.12); color:white; font-weight:600; }
  .tooltip .tt-wrong { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.4); }

  /* Question cards */
  .q-card { background:white; border:1px solid var(--grey-purple); border-radius:16px; padding:16px; margin-bottom:12px; }
  .q-card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .q-text { font-size:14px; font-weight:500; color:var(--dark-text); margin-bottom:8px; }
  .option-item { font-size:13px; padding:6px 12px; border-radius:8px; margin-bottom:4px; }
  .correct-item { background:var(--light-gold); color:var(--dark-text); font-weight:600; }
  .normal-item { background:#f9f9f9; color:#555; }
  .sentence-display { background:var(--light-purple); color:var(--purple); padding:8px 12px; border-radius:8px; font-family:monospace; font-size:13px; }
  .order-item { background:var(--light-gold); color:var(--dark-text); padding:6px 12px; border-radius:8px; font-size:13px; display:flex; gap:8px; margin-bottom:4px; }
  .match-prompt { background:var(--light-purple); color:var(--purple); padding:6px 12px; border-radius:8px; flex:1; font-size:13px; }
  .match-response { background:var(--light-gold); color:var(--dark-text); padding:6px 12px; border-radius:8px; flex:1; font-size:13px; }
  .match-row { display:flex; gap:6px; margin-bottom:4px; align-items:center; }
  .match-arrow { color:var(--grey-purple); font-size:11px; }
  .q-meta { font-size:11px; color:#777; margin-top:4px; }
  .q-meta span { font-weight:600; color:var(--purple); }
  .q-actions button { font-size:12px; cursor:pointer; background:none; border:none; font-family:system-ui; }

  .edit-input { width:100%; border:1px solid var(--grey-purple); border-radius:8px; padding:6px 10px; font-size:13px; box-sizing:border-box; color:var(--dark-text); }
  .edit-label { font-size:11px; font-weight:600; color:var(--purple); display:block; margin:6px 0 3px; }
  .edit-btn-row { display:flex; gap:8px; margin-top:10px; }
  .error-msg { color:#b91c1c; font-size:13px; margin-bottom:8px; }

  input[type=checkbox], input[type=radio] { accent-color:var(--purple); }
  a { color:var(--gold); }

  @media (max-width:600px) {
    .tooltip { right:0; width:240px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- FORM -->
  <div id="form-section">
    <div style="text-align:center;margin-bottom:20px;padding-top:8px;">
     
      <h1 style="font-size:26px;font-weight:700;color:var(--purple);margin:0 0 4px;">Quiz Engine</h1>
      <!--<p class="subtitle">AI-powered · Australian Curriculum aligned · School Box JSON export</p>-->
    </div>

    <div class="card">
      <div style="margin-bottom:16px;">
        <label class="label">Area of Study / Topic</label>
        <input id="topic" type="text" placeholder="e.g. Photosynthesis, World War II, Algebra..." class="input"/>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:16px;">
        <div style="flex:1;">
          <label class="label">Year Level</label>
          <select id="year-level" class="input">
            <option>Prep</option><option>Year 1</option><option>Year 2</option><option>Year 3</option>
            <option>Year 4</option><option>Year 5</option><option>Year 6</option><option>Year 7</option>
            <option selected>Year 8</option><option>Year 9</option><option>Year 10</option>
            <option>Year 11</option><option>Year 12</option>
          </select>
        </div>
        <div style="flex:1;">
          <label class="label">Number of Questions</label>
          <select id="q-count" class="input">
            <option>4</option><option>5</option><option selected>6</option><option>7</option><option>8</option>
            <option>9</option><option>10</option><option>12</option><option>14</option><option>16</option>
            <option>18</option><option>20</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <label class="label">Question Types <span style="font-weight:400;color:#999;">— hover for examples</span></label>
        <div id="type-checkboxes"></div>
      </div>
      <p id="form-error" class="error-msg hidden"></p>
      <button onclick="generateQuiz()" id="gen-btn" class="btn-primary">✨ Generate Quiz</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:0 4px;">
     <!-- <span style="font-size:10px;color:var(--grey-purple);font-weight:600;">Powered by OpenAI</span>
      <span style="font-size:10px;font-weight:600;color:var(--purple);background:var(--light-gold);padding:3px 10px;border-radius:999px;">Australian Curriculum Aligned</span>-->
    </div>
  </div>

  <!-- PREVIEW -->
  <div id="preview-section" class="hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div>
        <h2 id="preview-title" style="margin:0;color:var(--purple);font-weight:700;"></h2>
        <p id="preview-meta" class="subtitle" style="margin:2px 0 0;"></p>
      </div>
      <button onclick="resetForm()" style="font-size:13px;color:var(--purple);text-decoration:underline;background:none;border:none;cursor:pointer;">← New Quiz</button>
    </div>
    <div id="questions-list"></div>
    <div style="display:flex;gap:12px;padding:4px 0 20px;">
      <button onclick="generateQuiz()" id="regen-btn" class="btn-outline">🔄 Regenerate</button>
      <button onclick="exportJSON()" class="btn-gold">⬇️ Export .json</button>
    </div>
  </div>
 <div style="display:inline-flex;align-items:center;gap:8px;background:var(--purple);color:white;padding:8px 20px;border-radius:999px;font-size:13px;font-weight:600;margin-bottom:10px;">&copy; Wesley College 2026 </div>
</div>

<script>
const VERCEL_API = "https://wi-se-quiz-gen.vercel.app/api/generate";
let questions = [];

const TYPES = [
  { key:"mcq", label:"MCQ – Single Answer", desc:"One correct answer from 4 options", badgeBg:"#4f2759", badgeText:"white", default:true,
    tooltip:`<div class="tt-label">Example</div><div class="tt-q">What is the largest organ in the human body?</div><div class="tt-opt tt-correct">A. Skin ✓</div><div class="tt-opt tt-wrong">B. Heart</div><div class="tt-opt tt-wrong">C. Liver</div><div class="tt-opt tt-wrong">D. Brain</div>` },
  { key:"mcq-multi", label:"MCQ – Multiple Answers", desc:"Select all correct answers", badgeBg:"#e9deeb", badgeText:"#4f2759", default:false,
    tooltip:`<div class="tt-label">Example</div><div class="tt-q">Which are renewable energy sources?</div><div class="tt-opt tt-correct">A. Solar ✓</div><div class="tt-opt tt-wrong">B. Coal</div><div class="tt-opt tt-correct">C. Wind ✓</div><div class="tt-opt tt-wrong">D. Natural gas</div>` },
  { key:"drag-blank", label:"Fill in the Blank", desc:"Drag words into gaps in a sentence", badgeBg:"#c59f40", badgeText:"white", default:true,
    tooltip:`<div class="tt-label">Example</div><div class="tt-q">Complete the sentence:</div><div style="font-family:monospace;font-size:11px;background:rgba(255,255,255,0.08);padding:6px 8px;border-radius:6px;margin-bottom:4px;">The ___ is the powerhouse of the cell.</div><div class="tt-detail">Answer: mitochondria · Distractors: nucleus, ribosome</div>` },
  { key:"drag-order", label:"Order the Steps", desc:"Drag items into the correct sequence", badgeBg:"#e4d1a1", badgeText:"#2d1a33", default:false,
    tooltip:`<div class="tt-label">Example</div><div class="tt-q">Order the water cycle steps:</div><div class="tt-opt tt-correct">1. Evaporation</div><div class="tt-opt tt-correct">2. Condensation</div><div class="tt-opt tt-correct">3. Precipitation</div><div class="tt-opt tt-correct">4. Collection</div>` },
  { key:"match", label:"Match List", desc:"Match items on the left to the right", badgeBg:"#cec3cf", badgeText:"#2d1a33", default:true,
    tooltip:`<div class="tt-label">Example</div><div class="tt-q">Match the capital to the country:</div><div style="display:flex;gap:4px;margin-bottom:2px;"><span class="tt-opt tt-wrong" style="flex:1;">Australia</span><span style="color:rgba(255,255,255,0.2);font-size:10px;align-self:center;">→</span><span class="tt-opt tt-correct" style="flex:1;">Canberra</span></div><div style="display:flex;gap:4px;margin-bottom:2px;"><span class="tt-opt tt-wrong" style="flex:1;">Japan</span><span style="color:rgba(255,255,255,0.2);font-size:10px;align-self:center;">→</span><span class="tt-opt tt-correct" style="flex:1;">Tokyo</span></div>` },
];

const cb = document.getElementById("type-checkboxes");
TYPES.forEach(t => {
  const lbl = document.createElement("label");
  lbl.className = "type-option" + (t.default ? " selected" : "");
  lbl.innerHTML = `<input type="checkbox" ${t.default?"checked":""} data-type="${t.key}" onchange="updateTypeStyle(this)" style="margin-top:2px;">
    <div><span class="badge" style="background:${t.badgeBg};color:${t.badgeText}">${t.label}</span><p style="font-size:11px;color:#888;margin:4px 0 0;">${t.desc}</p></div>
    <div class="tooltip">${t.tooltip}</div>`;

  lbl.querySelector(".tooltip").addEventListener("click", e => e.stopPropagation());

  const infoBtn = document.createElement("span");
  infoBtn.textContent = "?";
  infoBtn.style.cssText = "width:18px;height:18px;border-radius:50%;background:var(--grey-purple);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;margin-left:auto;color:var(--purple);";
  infoBtn.addEventListener("click", e => {
    e.preventDefault(); e.stopPropagation();
    const tt = lbl.querySelector(".tooltip");
    const showing = tt.classList.contains("show");
    document.querySelectorAll(".tooltip.show").forEach(el => el.classList.remove("show"));
    if (!showing) tt.classList.add("show");
  });
  lbl.appendChild(infoBtn);
  cb.appendChild(lbl);
});

document.addEventListener("click", () => { document.querySelectorAll(".tooltip.show").forEach(el => el.classList.remove("show")); });

function updateTypeStyle(el) {
  const lbl = el.closest("label");
  if (el.checked) lbl.classList.add("selected"); else lbl.classList.remove("selected");
}
function getSelectedTypes() { return [...document.querySelectorAll("input[data-type]:checked")].map(el => el.dataset.type); }

function sbUUID() { const s4=()=>Math.floor((1+Math.random())*0x10000).toString(16).slice(1); return `sb-${s4()}${s4()}-${s4()}-${s4()}-${s4()}-${s4()}${s4()}${s4()}`; }

function buildSchoolBoxJSON(qs, topic) {
  const actRef=sbUUID(), itemRef=sbUUID(); const qMap={}, wr=[], qm=[];
  qs.forEach(q => { const ref=sbUUID(); wr.push({reference:ref,widget_type:"question"});
    if(q.type==="mcq"){qm.push({reference:ref,type:"mcq"});qMap[ref]={type:"mcq",widget_type:"response",reference:ref,data:{options:q.options.map((l,i)=>({label:`<h4>${l}</h4>\n`,value:String(i)})),stimulus:`<h3>${q.question}</h3>\n`,type:"mcq",validation:{scoring_type:"exactMatch",valid_response:{score:1,value:[String(q.correct)]}},ui_style:{choice_label:"upper-alpha",type:"block"}},metadata:{name:"Multiple choice – block layout",template_reference:"33d53a22-1a59-4a03-9671-7f5104edd62e"}};}
    else if(q.type==="mcq-multi"){qm.push({reference:ref,type:"mcq"});qMap[ref]={type:"mcq",widget_type:"response",reference:ref,data:{multiple_responses:true,options:q.options.map((l,i)=>({label:l,value:String(i)})),stimulus:q.question,type:"mcq",validation:{scoring_type:"exactMatch",valid_response:{score:1,value:q.correct.map(String)}},ui_style:{type:"horizontal"}},metadata:{name:"Multiple choice – multiple response",template_reference:"908de244-5c71-4c09-b094-7fb49554f2f9"}};}
    else if(q.type==="drag-blank"){qm.push({reference:ref,type:"clozeassociation"});const all=[...q.blanks,...q.distractors].sort(()=>Math.random()-0.5);qMap[ref]={type:"clozeassociation",widget_type:"response",reference:ref,data:{possible_responses:all.map(r=>`<h4>${r}</h4>\n`),response_container:{pointer:"left"},stimulus:`<h4>Complete the sentence</h4>\n`,template:`<h4>${q.sentence.replace(/___/g,"{{response}}")}</h4>\n`,type:"clozeassociation",validation:{scoring_type:"exactMatch",valid_response:{score:1,value:q.blanks.map(()=>null)}}},metadata:{name:"Cloze with drag & drop",template_reference:"51a8c1e7-f34f-4faf-b211-da458e891fcb"}};}
    else if(q.type==="drag-order"){qm.push({reference:ref,type:"clozeassociation"});const ord=q.correctOrder.map(i=>q.items[i]);qMap[ref]={type:"clozeassociation",widget_type:"response",reference:ref,data:{possible_responses:[...q.items].sort(()=>Math.random()-0.5).map(r=>`<h4>${r}</h4>\n`),response_container:{pointer:"left"},stimulus:`<h4>${q.question}</h4>\n`,template:`<h4>${ord.map(()=>"{{response}}").join("<br/>")}</h4>\n`,type:"clozeassociation",validation:{scoring_type:"exactMatch",valid_response:{score:1,value:ord.map(()=>null)}}},metadata:{name:"Order with drag & drop",template_reference:"51a8c1e7-f34f-4faf-b211-da458e891fcb"}};}
    else if(q.type==="match"){qm.push({reference:ref,type:"association"});qMap[ref]={type:"association",widget_type:"response",reference:ref,data:{possible_responses:q.pairs.map(p=>p.response),stimulus:q.stimulus,stimulus_list:q.pairs.map(p=>p.prompt),type:"association",validation:{scoring_type:"exactMatch",valid_response:{score:1,value:q.pairs.map(p=>p.response)}}},metadata:{name:"Match list",template_reference:"1fa22aac-1f88-47f7-941b-3c77759549e6"}};}
  });
  return {settings:{title:`${topic} Quiz`,description:"<p>Complete this quiz to demonstrate your understanding.</p>",workType:"Learning Task",dates:{publishAt:null,openAt:null,dueAt:null,closeAt:null},weight:0,shuffleItems:0,promptsMode:0,maxAttempts:0,duration:0,readingTimeDuration:0,completionMessage:"",defaultOpenSpan:null,curriculumNodes:[],markType:"raw",gradeGroup:"Standard",markScheme:"TotalMarkFractional",markVisibility:2,creator:null,context:null,sequence:null},assets:[],content:{activities:{[actRef]:{reference:actRef,title:null,description:"",data:{rendering_type:"assess",config:{configuration:{idle_timeout:{interval:300}},navigation:{show_intro:false,show_outro:false},regions:{"top-left":[{type:"title_element"}],"top-right":[{type:"itemcount_element"},{type:"reading_timer_element"},{type:"timer_element"}],items:[{type:"progress_element"},{type:"slider_element"}],right:[{type:"save_button"},{type:"reviewscreen_button"},{type:"resource_button"},{type:"flagitem_button"},{type:"masking_button"},{type:"verticaltoc_element"}],"bottom-left":[{type:"previous_button",show_label_option:true}],"bottom-right":[{type:"next_button"}]}},items:[{reference:itemRef,id:itemRef}]},status:"published",adaptive:{difficulty:null,operational_exposure:null,seeding_exposure:null}}},items:{[itemRef]:{reference:itemRef,title:topic,workflow:null,metadata:null,note:"",source:"",definition:{widgets:wr,template:"dynamic"},description:"",status:"published",questions:qm,features:[]}},questions:qMap,features:[]}};
}

async function generateQuiz() {
  const topic = document.getElementById("topic").value.trim();
  const yearLevel = document.getElementById("year-level").value;
  const n = parseInt(document.getElementById("q-count").value);
  const sel = getSelectedTypes();
  if (!topic) { showError("Please enter a topic."); return; }
  if (sel.length === 0) { showError("Please select at least one question type."); return; }
  setLoading(true);
  const per = Math.floor(n/sel.length), rem = n%sel.length;
  const counts = Object.fromEntries(sel.map((k,i)=>[k,per+(i<rem?1:0)]));
  const labels = {"mcq":"MCQ – Single Answer","mcq-multi":"MCQ – Multiple Answers","drag-blank":"Fill in the Blank","drag-order":"Order the Steps","match":"Match List"};
  const breakdown = sel.map(k=>`- ${counts[k]} × ${labels[k]}`).join("\n");
  const ti = {
    "mcq":`{"type":"mcq","question":"...","options":["A","B","C","D"],"correct":0}`,
    "mcq-multi":`{"type":"mcq-multi","question":"...","options":["A","B","C","D"],"correct":[0,2]}`,
    "drag-blank":`{"type":"drag-blank","question":"Complete the sentence.","sentence":"The ___ is the powerhouse of the cell.","blanks":["mitochondria"],"distractors":["nucleus","ribosome","vacuole"]}`,
    "drag-order":`{"type":"drag-order","question":"Order the steps correctly.","items":["Step A","Step B","Step C","Step D"],"correctOrder":[0,1,2,3]}`,
    "match":`{"type":"match","stimulus":"Match each item.","pairs":[{"prompt":"A","response":"1"},{"prompt":"B","response":"2"},{"prompt":"C","response":"3"}]}`
  };
  const prompt = `You are an educational quiz creator for Australian schools. All questions MUST align with the Australian Curriculum (ACARA v9.0) content descriptions for ${yearLevel}.

Create a quiz for ${yearLevel} students on: "${topic}".
Generate exactly ${n} questions:
${breakdown}

IMPORTANT:
- All content must be appropriate for ${yearLevel} students as defined by the Australian Curriculum.
- Questions should reflect the knowledge, understanding and skills outlined in the relevant ACARA content descriptions.
- Use Australian English spelling (e.g. colour, analyse, organisation).

Return ONLY a valid JSON array. No markdown, no backticks, no explanation.

${sel.map(k=>ti[k]).join("\n\n")}

Return ONLY the JSON array.`;

  try {
    const res = await fetch(VERCEL_API, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({prompt}) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    questions = JSON.parse(data.result.replace(/```json|```/g,"").trim());
    showPreview(topic, yearLevel);
  } catch(e) { showError("Failed: " + e.message); }
  setLoading(false);
}

function showPreview(topic, yearLevel) {
  document.getElementById("form-section").classList.add("hidden");
  document.getElementById("preview-section").classList.remove("hidden");
  document.getElementById("preview-title").textContent = topic;
  document.getElementById("preview-meta").textContent = `${yearLevel} · ${questions.length} questions`;
  renderQuestions();
}
function resetForm() { document.getElementById("form-section").classList.remove("hidden"); document.getElementById("preview-section").classList.add("hidden"); questions=[]; }

const BCOLORS = {mcq:["#4f2759","white"],"mcq-multi":["#e9deeb","#4f2759"],"drag-blank":["#c59f40","white"],"drag-order":["#e4d1a1","#2d1a33"],match:["#cec3cf","#2d1a33"]};
const BLABELS = {mcq:"MCQ – Single","mcq-multi":"MCQ – Multiple","drag-blank":"Fill in Blank","drag-order":"Order Steps",match:"Match List"};

function renderQuestions() { const l=document.getElementById("questions-list"); l.innerHTML=""; questions.forEach((q,i)=>l.appendChild(createCard(q,i))); }

function createCard(q,idx) {
  const d=document.createElement("div"); d.className="q-card";
  const [bg,col]=BCOLORS[q.type];
  let h=`<div class="q-card-top"><span class="badge" style="background:${bg};color:${col};">${BLABELS[q.type]}</span><div class="q-actions"><button onclick="startEdit(${idx})" style="color:#4f2759;">Edit</button><button onclick="deleteQ(${idx})" style="color:rgba(46,54,26,0.25);">Delete</button></div></div>`;
  h+=`<div class="q-text">${q.question||q.stimulus||""}</div>`;
  if(q.type==="mcq") h+=q.options.map((o,i)=>`<div class="option-item ${i===q.correct?"correct-item":"normal-item"}">${String.fromCharCode(65+i)}. ${o}${i===q.correct?" ✓":""}</div>`).join("");
  if(q.type==="mcq-multi") h+=q.options.map((o,i)=>`<div class="option-item ${q.correct.includes(i)?"correct-item":"normal-item"}">${String.fromCharCode(65+i)}. ${o}${q.correct.includes(i)?" ✓":""}</div>`).join("");
  if(q.type==="drag-blank") h+=`<div class="sentence-display">${q.sentence}</div><div class="q-meta">Answer: <span>${q.blanks.join(", ")}</span> · Distractors: ${q.distractors.join(", ")}</div>`;
  if(q.type==="drag-order") h+=q.correctOrder.map((oi,p)=>`<div class="order-item"><span style="font-weight:700;">${p+1}.</span>${q.items[oi]}</div>`).join("");
  if(q.type==="match") h+=q.pairs.map(p=>`<div class="match-row"><span class="match-prompt">${p.prompt}</span><span class="match-arrow">→</span><span class="match-response">${p.response}</span></div>`).join("");
  d.innerHTML=h; return d;
}

function deleteQ(idx) { questions.splice(idx,1); renderQuestions(); document.getElementById("preview-meta").textContent=`${document.getElementById("year-level").value} · ${questions.length} questions`; }

function startEdit(idx) {
  const q=questions[idx], card=document.getElementById("questions-list").children[idx];
  const [bg,col]=BCOLORS[q.type];
  let h=`<div class="q-card-top"><span class="badge" style="background:${bg};color:${col};">${BLABELS[q.type]}</span><span style="font-size:11px;color:#999;">Q${idx+1}</span></div>`;
  if(q.type==="mcq"){
    h+=`<textarea id="e-q" class="edit-input" rows="3" style="margin-bottom:8px;">${q.question}</textarea>`;
    q.options.forEach((o,i)=>{h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><input type="radio" name="correct" value="${i}" ${q.correct===i?"checked":""}><input class="edit-input" style="flex:1;" id="e-opt-${i}" value="${o}"></div>`;});
  } else if(q.type==="mcq-multi"){
    h+=`<textarea id="e-q" class="edit-input" rows="3" style="margin-bottom:8px;">${q.question}</textarea><p style="font-size:11px;color:#888;margin-bottom:6px;">Tick all correct:</p>`;
    q.options.forEach((o,i)=>{h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><input type="checkbox" name="correct-multi" value="${i}" ${q.correct.includes(i)?"checked":""}><input class="edit-input" style="flex:1;" id="e-opt-${i}" value="${o}"></div>`;});
  } else if(q.type==="drag-blank"){
    h+=`<textarea id="e-q" class="edit-input" rows="2" style="margin-bottom:6px;">${q.question}</textarea>`;
    h+=`<label class="edit-label">Sentence (use ___ for blank)</label><input id="e-sentence" class="edit-input" style="margin-bottom:6px;" value="${q.sentence}">`;
    h+=`<label class="edit-label">Answers (comma separated)</label><input id="e-blanks" class="edit-input" style="margin-bottom:6px;" value="${q.blanks.join(", ")}">`;
    h+=`<label class="edit-label">Distractors</label><input id="e-distractors" class="edit-input" value="${q.distractors.join(", ")}">`;
  } else if(q.type==="drag-order"){
    h+=`<textarea id="e-q" class="edit-input" rows="2" style="margin-bottom:6px;">${q.question}</textarea><label class="edit-label">Items (correct order)</label>`;
    q.correctOrder.forEach((oi,p)=>{h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;"><span style="font-size:11px;color:#888;width:16px;">${p+1}.</span><input class="edit-input e-item" data-orig="${oi}" value="${q.items[oi]}" style="flex:1;"></div>`;});
  } else if(q.type==="match"){
    h+=`<label class="edit-label">Stimulus</label><input id="e-stimulus" class="edit-input" style="margin-bottom:6px;" value="${q.stimulus}"><label class="edit-label">Pairs</label>`;
    q.pairs.forEach((p,i)=>{h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;"><input class="edit-input e-prompt" data-idx="${i}" value="${p.prompt}" style="flex:1;"><span style="color:var(--grey-purple);font-size:11px;">→</span><input class="edit-input e-response" data-idx="${i}" value="${p.response}" style="flex:1;"></div>`;});
  }
  h+=`<div class="edit-btn-row"><button onclick="saveEdit(${idx})" class="btn-small-purple">Save</button><button onclick="renderQuestions()" class="btn-small-light">Cancel</button></div>`;
  card.innerHTML=h;
}

function saveEdit(idx) {
  const q=questions[idx];
  if(q.type==="mcq"){q.question=document.getElementById("e-q").value;q.options=q.options.map((_,i)=>document.getElementById(`e-opt-${i}`).value);q.correct=parseInt(document.querySelector('input[name="correct"]:checked').value);}
  else if(q.type==="mcq-multi"){q.question=document.getElementById("e-q").value;q.options=q.options.map((_,i)=>document.getElementById(`e-opt-${i}`).value);q.correct=[...document.querySelectorAll('input[name="correct-multi"]:checked')].map(el=>parseInt(el.value));}
  else if(q.type==="drag-blank"){q.question=document.getElementById("e-q").value;q.sentence=document.getElementById("e-sentence").value;q.blanks=document.getElementById("e-blanks").value.split(",").map(s=>s.trim());q.distractors=document.getElementById("e-distractors").value.split(",").map(s=>s.trim());}
  else if(q.type==="drag-order"){q.question=document.getElementById("e-q").value;document.querySelectorAll(".e-item").forEach(el=>{q.items[parseInt(el.dataset.orig)]=el.value;});}
  else if(q.type==="match"){q.stimulus=document.getElementById("e-stimulus").value;document.querySelectorAll(".e-prompt").forEach(el=>{q.pairs[parseInt(el.dataset.idx)].prompt=el.value;});document.querySelectorAll(".e-response").forEach(el=>{q.pairs[parseInt(el.dataset.idx)].response=el.value;});}
  renderQuestions();
}

function exportJSON() {
  const topic=document.getElementById("topic").value.trim();
  const payload=buildSchoolBoxJSON(questions,topic);
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`${topic.replace(/\s+/g,"_")}_quiz.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function setLoading(on) {
  document.getElementById("gen-btn").textContent=on?"⏳ Generating...":"✨ Generate Quiz"; document.getElementById("gen-btn").disabled=on;
  const r=document.getElementById("regen-btn"); if(r){r.textContent=on?"Generating...":"🔄 Regenerate";r.disabled=on;}
}
function showError(msg) { const el=document.getElementById("form-error"); el.textContent=msg; el.classList.remove("hidden"); setTimeout(()=>el.classList.add("hidden"),5000); }
</script>
</body>
