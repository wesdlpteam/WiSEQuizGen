<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School Box Quiz Builder</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --purple: #4f2759;
    --gold: #c59f40;
    --light-purple: #e9deeb;
    --light-gold: #e4d1a1;
    --grey-purple: #cec3cf;
    --dark-text: #2d1a33;
  }
  body { font-family: system-ui, sans-serif; background: var(--light-purple); }
  input[type=range] { accent-color: var(--purple); width: 100%; }
  input[type=checkbox], input[type=radio] { accent-color: var(--purple); }
  .card { background: white; border-radius: 20px; border: 1px solid var(--grey-purple); padding: 28px; }
  .input { width: 100%; border: 1px solid var(--grey-purple); border-radius: 10px; padding: 10px 14px; font-size: 13px; outline: none; box-sizing: border-box; }
  .input:focus { box-shadow: 0 0 0 2px var(--purple); }
  .btn-primary { width: 100%; background: var(--purple); color: white; font-weight: 600; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-size: 14px; }
  .btn-primary:disabled { background: var(--grey-purple); cursor: not-allowed; }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .btn-outline { flex: 1; background: transparent; border: 2px solid var(--gold); color: var(--gold); font-weight: 600; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 14px; }
  .btn-gold { flex: 1; background: var(--gold); color: white; font-weight: 600; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-size: 14px; }
  .btn-gold:hover, .btn-outline:hover { opacity: 0.85; }
  .btn-small-purple { background: var(--purple); color: white; border: none; border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
  .btn-small-light { background: var(--light-purple); color: var(--purple); border: none; border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
  label.type-option { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border-radius: 12px; border: 2px solid var(--grey-purple); background: white; cursor: pointer; transition: all 0.15s; }
  label.type-option.selected { border-color: var(--purple); background: var(--light-purple); }
  .q-card { background: white; border: 1px solid var(--grey-purple); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 999px; display: inline-block; }
  .correct-item { background: var(--light-gold); color: var(--dark-text); font-weight: 600; }
  .normal-item { background: #f9f9f9; color: #555; }
  .option-item { font-size: 13px; padding: 6px 12px; border-radius: 8px; margin-bottom: 4px; }
  .match-prompt { background: var(--light-purple); color: var(--purple); padding: 6px 12px; border-radius: 8px; flex: 1; font-size: 13px; }
  .match-response { background: var(--light-gold); color: var(--dark-text); padding: 6px 12px; border-radius: 8px; flex: 1; font-size: 13px; }
  .sentence-display { background: var(--light-purple); color: var(--purple); padding: 8px 12px; border-radius: 8px; font-family: monospace; font-size: 13px; }
  .order-item { background: var(--light-gold); color: var(--dark-text); padding: 6px 12px; border-radius: 8px; font-size: 13px; display: flex; gap: 8px; margin-bottom: 4px; }
  h1 { color: var(--purple); }
  .subtitle { color: #7a5f80; font-size: 13px; }
  .label { font-size: 13px; font-weight: 600; color: var(--purple); display: block; margin-bottom: 6px; }
  .edit-label { font-size: 11px; font-weight: 600; color: var(--purple); display: block; margin: 6px 0 3px; }
  .edit-input { width: 100%; border: 1px solid var(--grey-purple); border-radius: 8px; padding: 6px 10px; font-size: 13px; box-sizing: border-box; }
  .edit-btn-row { display: flex; gap: 8px; margin-top: 10px; }
  a { color: var(--gold); }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 p-4 md:p-8">
<div class="max-w-2xl mx-auto">

  <!-- API KEY SCREEN -->
  <div id="key-screen" class="card" style="max-width:480px;margin:40px auto;">
    <div style="text-align:center;margin-bottom:20px;">
      <div style="display:inline-flex;align-items:center;gap:8px;background:var(--purple);color:white;padding:8px 20px;border-radius:999px;font-size:13px;font-weight:600;margin-bottom:12px;">📚 Wesley College · School Box LMS</div>
      <h1 style="font-size:24px;margin:0 0 6px;">Quiz Builder</h1>
      <p class="subtitle">Enter your Gemini API key to get started</p>
    </div>
    <label class="label">Google Gemini API Key</label>
    <input id="api-key-input" type="password" placeholder="AIza..." class="input" onkeydown="if(event.key==='Enter') saveKey()" style="margin-bottom:6px;"/>
    <p style="font-size:11px;color:#999;margin:4px 0 12px;">🔒 Stored in memory only — never saved to disk.</p>
    <p id="key-error" class="hidden" style="color:#b91c1c;font-size:13px;margin-bottom:8px;"></p>
    <button onclick="saveKey()" class="btn-primary">Continue →</button>
    <p style="text-align:center;font-size:11px;color:#999;margin-top:12px;">Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></p>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden" style="max-width:640px;margin:0 auto;">
    <div style="text-align:center;margin-bottom:28px;padding-top:16px;">
      <div style="display:inline-flex;align-items:center;gap:8px;background:var(--purple);color:white;padding:8px 20px;border-radius:999px;font-size:13px;font-weight:600;margin-bottom:12px;">📚 Wesley College · School Box LMS</div>
      <h1 style="font-size:26px;font-weight:700;margin:0 0 4px;">Quiz Builder</h1>
      <p class="subtitle">AI-powered · MCQ, Drag & Drop, Match · School Box JSON export</p>
    </div>

    <!-- FORM -->
    <div id="form-section" class="card" style="margin-bottom:16px;">
      <div style="margin-bottom:18px;">
        <label class="label">Area of Study / Topic</label>
        <input id="topic" type="text" placeholder="e.g. Photosynthesis, World War II, Algebra..." class="input"/>
      </div>
      <div style="margin-bottom:18px;">
        <label class="label">Year Level</label>
        <select id="year-level" class="input" style="background:white;">
          <option>Prep</option><option>Year 1</option><option>Year 2</option><option>Year 3</option>
          <option>Year 4</option><option>Year 5</option><option>Year 6</option><option>Year 7</option>
          <option selected>Year 8</option><option>Year 9</option><option>Year 10</option>
          <option>Year 11</option><option>Year 12</option>
        </select>
      </div>
      <div style="margin-bottom:18px;">
        <label class="label">Number of Questions: <span id="q-count-label" style="color:var(--gold)">6</span></label>
        <input id="q-count" type="range" min="4" max="20" value="6" oninput="document.getElementById('q-count-label').textContent=this.value"/>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#999;margin-top:2px;"><span>4</span><span>20</span></div>
      </div>
      <div style="margin-bottom:20px;">
        <label class="label">Question Types <span style="font-weight:400;color:#999;">— select all you want included</span></label>
        <div id="type-checkboxes"></div>
      </div>
      <p id="form-error" class="hidden" style="color:#b91c1c;font-size:13px;margin-bottom:8px;"></p>
      <button onclick="generateQuiz()" id="gen-btn" class="btn-primary">✨ Generate Quiz</button>
    </div>

    <!-- PREVIEW -->
    <div id="preview-section" class="hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div>
          <h2 id="preview-title" style="margin:0;color:var(--purple);font-weight:700;"></h2>
          <p id="preview-meta" class="subtitle" style="margin:2px 0 0;"></p>
        </div>
        <button onclick="resetForm()" style="font-size:13px;color:var(--purple);text-decoration:underline;background:none;border:none;cursor:pointer;">← New Quiz</button>
      </div>
      <div id="questions-list"></div>
      <div style="display:flex;gap:12px;padding:8px 0 24px;">
        <button onclick="generateQuiz()" id="regen-btn" class="btn-outline">🔄 Regenerate</button>
        <button onclick="exportJSON()" class="btn-gold">⬇️ Export .json</button>
      </div>
    </div>
  </div>
</div>

<script>
// Replace this with your actual Vercel deployment URL
const VERCEL_API = "https://YOUR-PROJECT.vercel.app/api/generate";

let questions = [];

const QUESTION_TYPES = [
  { key:"mcq",        label:"MCQ – Single Answer",    desc:"One correct answer from 4 options",     badgeBg:"#4f2759", badgeText:"white",   default:true  },
  { key:"mcq-multi",  label:"MCQ – Multiple Answers", desc:"Select all correct answers",             badgeBg:"#e9deeb", badgeText:"#4f2759", default:false },
  { key:"drag-blank", label:"Fill in the Blank",      desc:"Drag words into gaps in a sentence",    badgeBg:"#c59f40", badgeText:"white",   default:true  },
  { key:"drag-order", label:"Order the Steps",        desc:"Drag items into the correct sequence",  badgeBg:"#e4d1a1", badgeText:"#2d1a33", default:false },
  { key:"match",      label:"Match List",             desc:"Match items on the left to the right",  badgeBg:"#cec3cf", badgeText:"#2d1a33", default:true  },
];

// Render checkboxes
const cb = document.getElementById("type-checkboxes");
QUESTION_TYPES.forEach(t => {
  const div = document.createElement("label");
  div.className = "type-option" + (t.default ? " selected" : "");
  div.dataset.key = t.key;
  div.innerHTML = `<input type="checkbox" ${t.default?"checked":""} data-type="${t.key}" onchange="updateTypeStyle(this)" style="margin-top:2px;">
    <div><span class="badge" style="background:${t.badgeBg};color:${t.badgeText}">${t.label}</span><p style="font-size:11px;color:#888;margin:4px 0 0;">${t.desc}</p></div>`;
  cb.appendChild(div);
});

function updateTypeStyle(el) {
  const label = el.closest("label");
  if (el.checked) { label.classList.add("selected"); }
  else { label.classList.remove("selected"); }
}

function getSelectedTypes() {
  return [...document.querySelectorAll("input[data-type]:checked")].map(el => el.dataset.type);
}

// No key screen needed — key is stored securely on Vercel
function saveKey() {}

function sbUUID() {
  const s4 = () => Math.floor((1+Math.random())*0x10000).toString(16).slice(1);
  return `sb-${s4()}${s4()}-${s4()}-${s4()}-${s4()}-${s4()}${s4()}${s4()}`;
}

function buildSchoolBoxJSON(qs, topic) {
  const actRef = sbUUID(), itemRef = sbUUID();
  const qMap = {}, widgetRefs = [], qMeta = [];
  qs.forEach(q => {
    const ref = sbUUID();
    widgetRefs.push({ reference:ref, widget_type:"question" });
    if (q.type === "mcq") {
      qMeta.push({ reference:ref, type:"mcq" });
      qMap[ref] = { type:"mcq", widget_type:"response", reference:ref, data:{ options:q.options.map((l,i)=>({ label:`<h4>${l}</h4>\n`, value:String(i) })), stimulus:`<h3>${q.question}</h3>\n`, type:"mcq", validation:{ scoring_type:"exactMatch", valid_response:{ score:1, value:[String(q.correct)] } }, ui_style:{ choice_label:"upper-alpha", type:"block" } }, metadata:{ name:"Multiple choice – block layout", template_reference:"33d53a22-1a59-4a03-9671-7f5104edd62e" } };
    } else if (q.type === "mcq-multi") {
      qMeta.push({ reference:ref, type:"mcq" });
      qMap[ref] = { type:"mcq", widget_type:"response", reference:ref, data:{ multiple_responses:true, options:q.options.map((l,i)=>({ label:l, value:String(i) })), stimulus:q.question, type:"mcq", validation:{ scoring_type:"exactMatch", valid_response:{ score:1, value:q.correct.map(String) } }, ui_style:{ type:"horizontal" } }, metadata:{ name:"Multiple choice – multiple response", template_reference:"908de244-5c71-4c09-b094-7fb49554f2f9" } };
    } else if (q.type === "drag-blank") {
      qMeta.push({ reference:ref, type:"clozeassociation" });
      const all = [...q.blanks, ...q.distractors].sort(()=>Math.random()-0.5);
      qMap[ref] = { type:"clozeassociation", widget_type:"response", reference:ref, data:{ possible_responses:all.map(r=>`<h4>${r}</h4>\n`), response_container:{ pointer:"left" }, stimulus:`<h4>Complete the sentence</h4>\n`, template:`<h4>${q.sentence.replace(/___/g,"{{response}}")}</h4>\n`, type:"clozeassociation", validation:{ scoring_type:"exactMatch", valid_response:{ score:1, value:q.blanks.map(()=>null) } } }, metadata:{ name:"Cloze with drag & drop", template_reference:"51a8c1e7-f34f-4faf-b211-da458e891fcb" } };
    } else if (q.type === "drag-order") {
      qMeta.push({ reference:ref, type:"clozeassociation" });
      const ordered = q.correctOrder.map(i => q.items[i]);
      qMap[ref] = { type:"clozeassociation", widget_type:"response", reference:ref, data:{ possible_responses:[...q.items].sort(()=>Math.random()-0.5).map(r=>`<h4>${r}</h4>\n`), response_container:{ pointer:"left" }, stimulus:`<h4>${q.question}</h4>\n`, template:`<h4>${ordered.map(()=>"{{response}}").join("<br/>")}</h4>\n`, type:"clozeassociation", validation:{ scoring_type:"exactMatch", valid_response:{ score:1, value:ordered.map(()=>null) } } }, metadata:{ name:"Order with drag & drop", template_reference:"51a8c1e7-f34f-4faf-b211-da458e891fcb" } };
    } else if (q.type === "match") {
      qMeta.push({ reference:ref, type:"association" });
      qMap[ref] = { type:"association", widget_type:"response", reference:ref, data:{ possible_responses:q.pairs.map(p=>p.response), stimulus:q.stimulus, stimulus_list:q.pairs.map(p=>p.prompt), type:"association", validation:{ scoring_type:"exactMatch", valid_response:{ score:1, value:q.pairs.map(p=>p.response) } } }, metadata:{ name:"Match list", template_reference:"1fa22aac-1f88-47f7-941b-3c77759549e6" } };
    }
  });
  return { settings:{ title:`${topic} Quiz`, description:"<p>Complete this quiz to demonstrate your understanding.</p>", workType:"Learning Task", dates:{ publishAt:null, openAt:null, dueAt:null, closeAt:null }, weight:0, shuffleItems:0, promptsMode:0, maxAttempts:0, duration:0, readingTimeDuration:0, completionMessage:"", defaultOpenSpan:null, curriculumNodes:[], markType:"raw", gradeGroup:"Standard", markScheme:"TotalMarkFractional", markVisibility:2, creator:null, context:null, sequence:null }, assets:[], content:{ activities:{ [actRef]:{ reference:actRef, title:null, description:"", data:{ rendering_type:"assess", config:{ configuration:{ idle_timeout:{ interval:300 } }, navigation:{ show_intro:false, show_outro:false }, regions:{ "top-left":[{ type:"title_element" }], "top-right":[{ type:"itemcount_element" },{ type:"reading_timer_element" },{ type:"timer_element" }], items:[{ type:"progress_element" },{ type:"slider_element" }], right:[{ type:"save_button" },{ type:"reviewscreen_button" },{ type:"resource_button" },{ type:"flagitem_button" },{ type:"masking_button" },{ type:"verticaltoc_element" }], "bottom-left":[{ type:"previous_button", show_label_option:true }], "bottom-right":[{ type:"next_button" }] } }, items:[{ reference:itemRef, id:itemRef }] }, status:"published", adaptive:{ difficulty:null, operational_exposure:null, seeding_exposure:null } } }, items:{ [itemRef]:{ reference:itemRef, title:topic, workflow:null, metadata:null, note:"", source:"", definition:{ widgets:widgetRefs, template:"dynamic" }, description:"", status:"published", questions:qMeta, features:[] } }, questions:qMap, features:[] } };
}

async function generateQuiz() {
  const topic = document.getElementById("topic").value.trim();
  const yearLevel = document.getElementById("year-level").value;
  const n = parseInt(document.getElementById("q-count").value);
  const selectedTypes = getSelectedTypes();
  if (!topic) { showError("Please enter a topic."); return; }
  if (selectedTypes.length === 0) { showError("Please select at least one question type."); return; }
  setLoading(true);

  const perType = Math.floor(n / selectedTypes.length);
  const rem = n % selectedTypes.length;
  const counts = Object.fromEntries(selectedTypes.map((k,i) => [k, perType + (i < rem ? 1 : 0)]));
  const typeLabels = { "mcq":"MCQ – Single Answer", "mcq-multi":"MCQ – Multiple Answers", "drag-blank":"Fill in the Blank", "drag-order":"Order the Steps", "match":"Match List" };
  const breakdown = selectedTypes.map(k => `- ${counts[k]} × ${typeLabels[k]}`).join("\n");

  const typeInstructions = {
    "mcq":        `{"type":"mcq","question":"...","options":["A","B","C","D"],"correct":0}`,
    "mcq-multi":  `{"type":"mcq-multi","question":"...","options":["A","B","C","D"],"correct":[0,2]}`,
    "drag-blank": `{"type":"drag-blank","question":"Complete the sentence.","sentence":"The ___ is the powerhouse of the cell.","blanks":["mitochondria"],"distractors":["nucleus","ribosome","vacuole"]}`,
    "drag-order": `{"type":"drag-order","question":"Order the steps correctly.","items":["Step A","Step B","Step C","Step D"],"correctOrder":[0,1,2,3]}`,
    "match":      `{"type":"match","stimulus":"Match each item to its description.","pairs":[{"prompt":"Cause A","response":"Effect A"},{"prompt":"Cause B","response":"Effect B"},{"prompt":"Cause C","response":"Effect C"}]}`
  };
  const formats = selectedTypes.map(k => typeInstructions[k]).join("\n\n");

  const prompt = `You are an educational quiz creator for Australian schools.
Create a quiz for ${yearLevel} students on: "${topic}".
Generate exactly ${n} questions with this breakdown:
${breakdown}

Return ONLY a valid JSON array. No markdown, no backticks, no explanation.

Use these exact formats:
${formats}

Return ONLY the JSON array.`;

  try {
    const res = await fetch(VERCEL_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const raw = data.result;
    questions = JSON.parse(raw.replace(/```json|```/g,"").trim());
    showPreview(topic, yearLevel);
  } catch(e) { showError("Failed to generate questions: " + e.message); }
  setLoading(false);
}

function showPreview(topic, yearLevel) {
  document.getElementById("form-section").classList.add("hidden");
  document.getElementById("preview-section").classList.remove("hidden");
  document.getElementById("preview-title").textContent = topic;
  document.getElementById("preview-meta").textContent = `${yearLevel} · ${questions.length} questions`;
  renderQuestions();
}

function resetForm() {
  document.getElementById("form-section").classList.remove("hidden");
  document.getElementById("preview-section").classList.add("hidden");
  questions = [];
}

const BADGES = { mcq:"#4f2759", "mcq-multi":"#e9deeb", "drag-blank":"#c59f40", "drag-order":"#e4d1a1", match:"#cec3cf" };
const BADGE_TEXT = { mcq:"white", "mcq-multi":"#4f2759", "drag-blank":"white", "drag-order":"#2d1a33", match:"#2d1a33" };
const LABELS = { mcq:"MCQ – Single", "mcq-multi":"MCQ – Multiple", "drag-blank":"Fill in Blank", "drag-order":"Order Steps", match:"Match List" };

function renderQuestions() {
  const list = document.getElementById("questions-list");
  list.innerHTML = "";
  questions.forEach((q, i) => list.appendChild(createCard(q, i)));
}

function createCard(q, idx) {
  const div = document.createElement("div");
  div.className = "border rounded-xl p-4 bg-white shadow-sm space-y-3";
  const badge = `<span class="text-xs font-semibold px-2 py-1 rounded-full ${BADGES[q.type]}">${LABELS[q.type]}</span>`;
  let body = `<div class="flex items-start justify-between gap-2"><div class="flex items-center gap-2">${badge}<span class="text-xs text-gray-400">Q${idx+1}</span></div><div class="flex gap-2"><button onclick="startEdit(${idx})" class="text-xs text-blue-600 hover:underline">Edit</button><button onclick="deleteQ(${idx})" class="text-xs text-red-500 hover:underline">Delete</button></div></div>`;
  const qtext = q.question || q.stimulus || "";
  body += `<p class="text-sm font-medium text-gray-800">${qtext}</p>`;
  if (q.type==="mcq") body += `<ul class="space-y-1">${q.options.map((o,i)=>`<li class="text-sm px-3 py-1.5 rounded-lg ${i===q.correct?"bg-green-50 text-green-700 font-semibold":"bg-gray-50 text-gray-600"}">${String.fromCharCode(65+i)}. ${o} ${i===q.correct?"✓":""}</li>`).join("")}</ul>`;
  if (q.type==="mcq-multi") body += `<ul class="space-y-1">${q.options.map((o,i)=>`<li class="text-sm px-3 py-1.5 rounded-lg ${q.correct.includes(i)?"bg-green-50 text-green-700 font-semibold":"bg-gray-50 text-gray-600"}">${String.fromCharCode(65+i)}. ${o} ${q.correct.includes(i)?"✓":""}</li>`).join("")}</ul>`;
  if (q.type==="drag-blank") body += `<p class="text-sm bg-purple-50 px-3 py-2 rounded-lg text-purple-800 font-mono">${q.sentence}</p><p class="text-xs text-gray-500">Answer: <span class="font-semibold text-green-700">${q.blanks.join(", ")}</span> · Distractors: ${q.distractors.join(", ")}</p>`;
  if (q.type==="drag-order") body += `<ol class="space-y-1">${q.correctOrder.map((oi,pos)=>`<li class="text-sm bg-green-50 text-green-800 px-3 py-1.5 rounded-lg flex gap-2"><span class="font-semibold">${pos+1}.</span>${q.items[oi]}</li>`).join("")}</ol>`;
  if (q.type==="match") body += `<div class="space-y-1">${q.pairs.map(p=>`<div class="flex gap-2 text-sm"><span class="bg-orange-50 text-orange-800 px-3 py-1.5 rounded-lg flex-1">${p.prompt}</span><span class="text-gray-400 self-center">→</span><span class="bg-green-50 text-green-800 px-3 py-1.5 rounded-lg flex-1">${p.response}</span></div>`).join("")}</div>`;
  div.innerHTML = body;
  return div;
}

function deleteQ(idx) {
  questions.splice(idx, 1);
  renderQuestions();
  document.getElementById("preview-meta").textContent = `${document.getElementById("year-level").value} · ${questions.length} questions`;
}

function startEdit(idx) {
  const q = questions[idx];
  const card = document.getElementById("questions-list").children[idx];
  const badge = `<span class="text-xs font-semibold px-2 py-1 rounded-full ${BADGES[q.type]}">${LABELS[q.type]}</span>`;
  let html = `<div class="flex items-center justify-between mb-3">${badge}<span class="text-xs text-gray-400">Q${idx+1}</span></div>`;

  if (q.type==="mcq") {
    html += `<textarea id="e-q" class="w-full border rounded p-2 text-sm mb-3" rows="3">${q.question}</textarea>`;
    q.options.forEach((o,i) => { html += `<div class="flex items-center gap-2 mb-2"><input type="radio" name="correct" value="${i}" ${q.correct===i?"checked":""}><input class="border rounded p-1 text-sm flex-1" id="e-opt-${i}" value="${o}"><span class="text-xs text-green-600">${q.correct===i?"✓ Correct":""}</span></div>`; });
  } else if (q.type==="mcq-multi") {
    html += `<textarea id="e-q" class="w-full border rounded p-2 text-sm mb-3" rows="3">${q.question}</textarea><p class="text-xs text-gray-500 mb-2">Tick all correct answers:</p>`;
    q.options.forEach((o,i) => { html += `<div class="flex items-center gap-2 mb-2"><input type="checkbox" name="correct-multi" value="${i}" ${q.correct.includes(i)?"checked":""}><input class="border rounded p-1 text-sm flex-1" id="e-opt-${i}" value="${o}"></div>`; });
  } else if (q.type==="drag-blank") {
    html += `<textarea id="e-q" class="w-full border rounded p-2 text-sm mb-2" rows="2">${q.question}</textarea>
    <label class="text-xs font-semibold text-gray-600">Sentence (use ___ for blank)</label><input id="e-sentence" class="w-full border rounded p-2 text-sm mt-1 mb-2" value="${q.sentence}">
    <label class="text-xs font-semibold text-gray-600">Correct Answer(s) — comma separated</label><input id="e-blanks" class="w-full border rounded p-2 text-sm mt-1 mb-2" value="${q.blanks.join(", ")}">
    <label class="text-xs font-semibold text-gray-600">Distractors — comma separated</label><input id="e-distractors" class="w-full border rounded p-2 text-sm mt-1 mb-2" value="${q.distractors.join(", ")}">`;
  } else if (q.type==="drag-order") {
    html += `<textarea id="e-q" class="w-full border rounded p-2 text-sm mb-2" rows="2">${q.question}</textarea><label class="text-xs font-semibold text-gray-600">Items (in correct order)</label>`;
    q.correctOrder.forEach((oi,pos) => { html += `<div class="flex items-center gap-2 mt-1"><span class="text-xs text-gray-400 w-5">${pos+1}.</span><input class="border rounded p-1 text-sm flex-1 e-item" data-orig="${oi}" value="${q.items[oi]}"></div>`; });
  } else if (q.type==="match") {
    html += `<label class="text-xs font-semibold text-gray-600">Stimulus</label><input id="e-stimulus" class="w-full border rounded p-2 text-sm mt-1 mb-2" value="${q.stimulus}"><label class="text-xs font-semibold text-gray-600">Pairs (Prompt → Response)</label>`;
    q.pairs.forEach((p,i) => { html += `<div class="flex items-center gap-2 mt-1"><input class="border rounded p-1 text-sm flex-1 e-prompt" data-idx="${i}" value="${p.prompt}"><span class="text-gray-400">→</span><input class="border rounded p-1 text-sm flex-1 e-response" data-idx="${i}" value="${p.response}"></div>`; });
  }

  html += `<div class="flex gap-2 mt-3"><button onclick="saveEdit(${idx})" class="bg-blue-600 text-white text-sm px-4 py-1.5 rounded-lg hover:bg-blue-700">Save</button><button onclick="renderQuestions()" class="bg-gray-100 text-gray-700 text-sm px-4 py-1.5 rounded-lg hover:bg-gray-200">Cancel</button></div>`;
  card.innerHTML = html;
}

function saveEdit(idx) {
  const q = questions[idx];
  if (q.type==="mcq") {
    q.question = document.getElementById("e-q").value;
    q.options = q.options.map((_,i) => document.getElementById(`e-opt-${i}`).value);
    q.correct = parseInt(document.querySelector('input[name="correct"]:checked').value);
  } else if (q.type==="mcq-multi") {
    q.question = document.getElementById("e-q").value;
    q.options = q.options.map((_,i) => document.getElementById(`e-opt-${i}`).value);
    q.correct = [...document.querySelectorAll('input[name="correct-multi"]:checked')].map(el => parseInt(el.value));
  } else if (q.type==="drag-blank") {
    q.question = document.getElementById("e-q").value;
    q.sentence = document.getElementById("e-sentence").value;
    q.blanks = document.getElementById("e-blanks").value.split(",").map(s=>s.trim());
    q.distractors = document.getElementById("e-distractors").value.split(",").map(s=>s.trim());
  } else if (q.type==="drag-order") {
    q.question = document.getElementById("e-q").value;
    document.querySelectorAll(".e-item").forEach(el => { q.items[parseInt(el.dataset.orig)] = el.value; });
  } else if (q.type==="match") {
    q.stimulus = document.getElementById("e-stimulus").value;
    document.querySelectorAll(".e-prompt").forEach(el => { q.pairs[parseInt(el.dataset.idx)].prompt = el.value; });
    document.querySelectorAll(".e-response").forEach(el => { q.pairs[parseInt(el.dataset.idx)].response = el.value; });
  }
  renderQuestions();
}

function exportJSON() {
  const topic = document.getElementById("topic").value.trim();
  const payload = buildSchoolBoxJSON(questions, topic);
  const uri = "data:application/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload, null, 2));
  const a = document.createElement("a"); a.href=uri; a.download=`${topic.replace(/\s+/g,"_")}_quiz.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function setLoading(on) {
  document.getElementById("gen-btn").textContent = on ? "⏳ Generating Questions..." : "✨ Generate Quiz";
  document.getElementById("gen-btn").disabled = on;
  const r = document.getElementById("regen-btn");
  if (r) { r.textContent = on ? "Regenerating..." : "🔄 Regenerate"; r.disabled = on; }
}

function showError(msg) {
  const el = document.getElementById("form-error");
  el.textContent = msg; el.classList.remove("hidden");
  setTimeout(() => el.classList.add("hidden"), 5000);
}</script>
